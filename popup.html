<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Caption Prompt Launcher</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <header class="header">
        <div>
          <p class="eyebrow">CAPTION LAUNCHER</p>
          <h1>把字幕送去 AI</h1>
        </div>
        <span class="status-dot" title="所有设置仅保存在本机"></span>
      </header>

      <nav class="view-tabs" aria-label="功能切换">
        <button class="view-tab active" type="button" data-view="captions">获取字幕</button>
        <button class="view-tab" type="button" data-view="launcher">Prompt 转发</button>
      </nav>

      <section id="captionsView" class="view-panel">
        <div class="caption-heading">
          <div>
            <span class="label">当前页面字幕</span>
            <p id="captionStatus" class="caption-status">正在扫描当前页面…</p>
          </div>
          <button id="refreshCaptions" class="icon-button text-button" type="button">重新扫描</button>
        </div>

        <div id="captionTracks" class="caption-tracks"></div>

        <div id="captionEmpty" class="caption-empty">
          <strong>还没有捕获到字幕</strong>
          <span>YouTube 请先播放视频或打开一次字幕；Bilibili 会自动查询官方字幕。</span>
        </div>

        <textarea
          id="captionPreview"
          class="caption-preview"
          readonly
          placeholder="捕获到字幕后会显示在这里。"
        ></textarea>

        <div class="caption-actions">
          <button id="copyCaption" class="secondary-action" type="button" disabled>复制字幕</button>
          <button id="useCaption" class="primary-action" type="button" disabled>使用此字幕 →</button>
        </div>
      </section>

      <section id="launcherView" class="view-panel" hidden>
      <section class="section">
        <div class="template-header">
          <span class="label template-label">Prompt 模板</span>
          <div class="template-actions">
            <button id="renameTemplate" class="icon-button text-button" type="button">重命名</button>
            <button id="deleteTemplate" class="icon-button" type="button" title="删除当前模板">−</button>
          </div>
        </div>
        <div id="templateList" class="template-list" aria-label="Prompt 模板"></div>
        <textarea
          id="prompt"
          rows="6"
          placeholder="例如：请总结下面的视频字幕，列出关键观点，并保留重要时间戳。"
        ></textarea>
        <div class="row compact">
          <span class="hint">自动保存</span>
          <span id="promptCount" class="hint">0 字</span>
        </div>
      </section>

      <section class="section">
        <span class="label">发送到</span>
        <div class="targets" role="radiogroup" aria-label="目标网站">
          <label class="target">
            <input type="radio" name="target" value="aistudio" checked>
            <span>AI Studio</span>
          </label>
          <label class="target">
            <input type="radio" name="target" value="gemini">
            <span>Gemini</span>
          </label>
          <label class="target">
            <input type="radio" name="target" value="notebooklm">
            <span>NotebookLM</span>
          </label>
          <label class="target">
            <input type="radio" name="target" value="chatgpt">
            <span>ChatGPT</span>
          </label>
          <label class="target">
            <input type="radio" name="target" value="claude">
            <span>Claude</span>
          </label>
          <label class="target">
            <input type="radio" name="target" value="grok">
            <span>Grok</span>
          </label>
        </div>
        <p id="targetNote" class="target-note"></p>
      </section>

      <section class="settings">
        <label class="setting">
          <span>
            <strong>Prompt 位置</strong>
            <small>放在字幕之前或之后</small>
          </span>
          <select id="promptPosition">
            <option value="before">字幕之前</option>
            <option value="after">字幕之后</option>
          </select>
        </label>

        <label class="setting">
          <span>
            <strong>填入后自动发送</strong>
            <small>实验功能，默认关闭</small>
          </span>
          <input id="autoSend" class="switch" type="checkbox">
        </label>
      </section>

      <button id="launch" class="launch" type="button">
        <span>使用当前字幕并打开</span>
        <span aria-hidden="true">→</span>
      </button>

      <p id="message" class="message" role="status"></p>
      <p class="privacy">字幕只会发送到你选择的网站，不经过额外服务器。</p>
      </section>
    </main>

    <script src="shared.js"></script>
    <script src="transcript-utils.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
